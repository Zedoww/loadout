name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Loadout.sln

      - name: Build
        run: dotnet build Loadout.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Loadout.sln --configuration Release --no-build --verbosity normal
