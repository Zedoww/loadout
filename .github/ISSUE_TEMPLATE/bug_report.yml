name: 🐛 Rapport de bug
description: Signaler un dysfonctionnement
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Décris clairement le problème.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Ouvrir l'onglet ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Version de Windows
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Matériel (CPU / GPU)
      placeholder: "Ryzen 7 5800X / RTX 3070"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Colle le contenu de %APPDATA%\Loadout\logs si pertinent.
      render: shell
