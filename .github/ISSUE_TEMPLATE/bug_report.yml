name: 🐛 Bug report
description: Report a malfunction
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the ... tab
        2. Click on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware (CPU / GPU)
      placeholder: "Ryzen 7 5800X / RTX 3070"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the contents of %APPDATA%\Loadout\logs if relevant.
      render: shell
