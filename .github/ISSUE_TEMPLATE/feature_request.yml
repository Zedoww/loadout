name: 💡 Feature request
description: Suggest an improvement or a new optimization
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / need
      description: What gap or frustration does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: reversible
    attributes:
      label: Does it modify the system?
      description: Reminder — every system change must be reversible.
      options:
        - "No, read-only / UI only"
        - "Yes, and I know how to make it reversible"
        - "Yes, but I'm not sure about reversibility"
    validations:
      required: true
